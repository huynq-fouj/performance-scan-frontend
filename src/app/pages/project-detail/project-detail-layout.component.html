<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 animate-fade-in animate-slide-up">
  
  <!-- Back navigation & Breadcrumb -->
  <div class="mb-6 flex flex-col gap-4">
    <a routerLink="/dashboard/projects" class="inline-flex items-center text-sm font-medium text-gray-500 hover:text-gray-900 w-fit">
      <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
      </svg>
      Back to Projects
    </a>
  </div>

  <!-- Project Header -->
  <div class="bg-white rounded-t-xl border border-gray-100 shadow-sm border-b-0 overflow-hidden">
    <div class="p-4 sm:px-6 sm:py-5 flex items-center gap-4">
      <!-- Logo -->
      <div class="w-12 h-12 rounded-xl flex-shrink-0 overflow-hidden flex items-center justify-center border border-gray-100 bg-gray-50 text-primary-600 font-bold text-xl uppercase">
        @if (project.logo) {
          <img [src]="project.logo" [alt]="project.name" class="w-full h-full object-cover" (error)="$any($event).target.style.display = 'none'" />
        } @else {
          {{ project.name.charAt(0).toUpperCase() }}
        }
      </div>

      <!-- Info -->
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-3 mb-1">
          <h1 class="text-xl font-bold text-gray-900 truncate">{{ project.name }}</h1>
          <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wider bg-emerald-50 text-emerald-700">
            {{ project.status }}
          </span>
        </div>
        <a [href]="project.url" target="_blank" class="text-sm text-primary-600 hover:text-primary-700 font-medium no-underline inline-flex items-center">
          {{ project.url }}
          <svg class="w-3 h-3 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
        </a>
      </div>

      <!-- Actions -->
      <div class="flex items-center gap-3 shrink-0">
        <button class="btn-primary py-1.5 px-3 text-sm">
          <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
          Run Scan
        </button>
      </div>
    </div>

    <!-- Tabs Navigation -->
    <div class="px-5 sm:px-6 bg-white border-b border-gray-100">
      <nav class="-mb-px flex space-x-6 sm:space-x-8 overflow-x-auto scroolbar-hide" aria-label="Tabs">
        <!-- Loop over tabs -->
        @for (tab of tabs; track tab.path) {
          <a [routerLink]="['./', tab.path]" 
             routerLinkActive="active-tab"
             class="tab-link outline-none">
            {{ tab.name }}
          </a>
        }
      </nav>
    </div>
  </div>

  <!-- Router Outlet for Tabs -->
  <div class="mt-4">
    <router-outlet></router-outlet>
  </div>
</div>
