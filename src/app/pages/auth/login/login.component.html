<!-- Mobile Logo (Visible only on mobile since left panel is hidden) -->
<div class="lg:hidden mb-8 flex justify-center">
  <div class="logo-icon logo-icon-mobile">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
    </svg>
  </div>
</div>

<div class="auth-header">
  <h2 class="auth-title">Welcome back</h2>
  <p class="auth-subtitle">Please enter your details to sign in.</p>
</div>

<div class="auth-providers">
  <button class="btn-secondary w-full flex justify-center items-center gap-2 font-medium">
    <svg viewBox="0 0 24 24" class="w-5 h-5" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Sign in with Google
  </button>
</div>

<div class="auth-divider">
  <span class="auth-divider-text">Or sign in with email</span>
</div>

<form class="auth-form" (submit)="$event.preventDefault(); onSubmit()">
  <div *ngIf="errorMessage" class="bg-red-50 text-red-600 p-3 rounded-lg mb-4 text-sm font-medium">
    {{ errorMessage }}
  </div>

  <div class="form-group">
    <label for="email" class="form-label">Email</label>
    <div class="input-with-icon">
      <div class="input-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4.5 h-4.5 text-gray-400">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
      </div>
      <input type="email" id="email" name="email" [(ngModel)]="loginForm.email" class="input-field pl-10" placeholder="Enter your email" required>
    </div>
  </div>

  <div class="form-group">
    <label for="password" class="form-label">Password</label>
    <div class="input-with-icon">
      <div class="input-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4.5 h-4.5 text-gray-400">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <input type="password" id="password" name="password" [(ngModel)]="loginForm.password" class="input-field pl-10" placeholder="••••••••" required>
    </div>
  </div>

  <div class="form-options">
    <label class="checkbox-container">
      <input type="checkbox" class="checkbox-input">
      <span class="checkbox-box"></span>
      <span class="checkbox-label">Remember for 30 days</span>
    </label>
    
    <a href="javascript:void(0)" class="forgot-password">Forgot password?</a>
  </div>

  <button type="submit" [disabled]="isLoading" class="btn-primary w-full shadow-md hover:shadow-lg disabled:opacity-50">
    {{ isLoading ? 'Signing in...' : 'Sign In' }}
  </button>
</form>

<div class="auth-footer">
  <p class="auth-footer-text">
    Don't have an account? <a routerLink="/auth/register" class="auth-link">Sign up</a>
  </p>
</div>
